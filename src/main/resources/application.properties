# Creo que así debería ser la conexión a la DB
spring.datasource.url=jdbc:postgresql://localhost:5432/donaciones
spring.datasource.username=postgres
spring.datasource.password=donaciones
spring.datasource.driver-class-name=org.postgresql.Driver


# Enable H2 Console
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Opcional
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# DevTools Configuration
spring.devtools.restart.enabled=true

# Server Configuration for Dockerfile
server.port=${PORT:8080}

#Los de los otros componentes
url.logistica=http://localhost:8081
url.donadoresYEntidades=http://localhost:8082
url.incentivos=http://localhost:8083